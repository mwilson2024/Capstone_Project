name: Build and deploy Python app to Azure Web App - csi4999-api

on:
  push:
    branches:
      - main
    paths:
      - "Python/api/**"
      - "Python/requirements.txt"
      - ".github/workflows/main_csi4999-api.yml"

  workflow_dispatch:

env:
  PYTHON_VERSION: "3.11"
  API_PATH: "Python/api"
  REQUIREMENTS_PATH: "Python/requirements.txt"

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install API dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r "${{ env.REQUIREMENTS_PATH }}"

      - name: Copy requirements into API deployment folder
        run: |
          cp "${{ env.REQUIREMENTS_PATH }}" "${{ env.API_PATH }}/requirements.txt"

      - name: Upload API deployment artifact
        uses: actions/upload-artifact@v4
        with:
          name: python-api
          path: ${{ env.API_PATH }}
          if-no-files-found: error
          retention-days: 1

  deploy:
    runs-on: ubuntu-latest
    needs: build

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: python-app
      
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_782F0D5BF36047EC8DB47413870CA33A }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_039F3B379BD74315857365DDACAFC6D9 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_465D1896EEB748D5B6318C3ECDE2B4DC }}

      - name: 'Deploy to Azure Web App'
        uses: azure/webapps-deploy@v3
        id: deploy-to-webapp
        with:
          app-name: 'csi4999-api'
          slot-name: 'Production'
          
