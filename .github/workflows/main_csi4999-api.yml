name: Build and deploy Python app to Azure Web App - csi4999-api

on:
  push:
    branches:
      - main
    paths:
      - "Python/API/**"
      - ".github/workflows/main_csi4999-api.yml"

  workflow_dispatch:

env:
  PYTHON_VERSION: "3.11"
  API_PATH: "Python/API"

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install API dependencies
        working-directory: ${{ env.API_PATH }}
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Upload API deployment artifact
        uses: actions/upload-artifact@v4
        with:
          name: python-api
          path: ${{ env.API_PATH }}
          if-no-files-found: error
          retention-days: 1

  deploy:
    runs-on: ubuntu-latest
    needs: build

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download API deployment artifact
        uses: actions/download-artifact@v4
        with:
          name: python-api
          path: api-package

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_9E76C5A5E3AB4196A1E0EA49704E9706 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_F7019DB7F70041509CEBBCB8827C42D1 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_2E4A0744745B4C5AA59E09617200A01C }}

      - name: Deploy API to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: "csi4999-api"
          slot-name: "Production"
          package: "api-package"
