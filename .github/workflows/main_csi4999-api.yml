name: Build and deploy Python app to Azure Web App - csi4999-api

on:
  push:
    branches:
      - main
    paths:
      - "Python/api/**"
      - "Python/requirements.txt"
      - ".github/workflows/main_csi4999-api.yml"

  workflow_dispatch:

env:
  PYTHON_VERSION: "3.11"
  API_PATH: "Python/api"
  REQUIREMENTS_PATH: "Python/requirements.txt"

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install API dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r "${{ env.REQUIREMENTS_PATH }}"

      - name: Copy requirements into API deployment folder
        run: |
          cp "${{ env.REQUIREMENTS_PATH }}" "${{ env.API_PATH }}/requirements.txt"

      - name: Upload API deployment artifact
        uses: actions/upload-artifact@v4
        with:
          name: python-api
          path: ${{ env.API_PATH }}
          if-no-files-found: error
          retention-days: 1

  deploy:
    runs-on: ubuntu-latest
    needs: build

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download API deployment artifact
        uses: actions/download-artifact@v4
        with:
          name: python-api
          path: api-package

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_A1263883A25F4B789A9ED13113B154A4 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_E75A7838127F44D08BB80B3F032D447D }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_25FDA1C95BDF4044895F1A49A7536269 }}

      - name: Deploy API to Azure Web App
        uses: azure/webapps-deploy@v3
        id: deploy-to-webapp
        with:
          app-name: "csi4999-api"
          slot-name: "Production"
          package: "api-package"
          
