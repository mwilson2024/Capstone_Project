name: Build and deploy Python app to Azure Web App - csi4999-api

on:
  push:
    branches:
      - main
    paths:
      - "Python/api/**"
      - "Python/shared/**"
      - "Python/requirements.txt"
      - ".github/workflows/main_csi4999-api.yml"

  workflow_dispatch:

env:
  PYTHON_VERSION: "3.11"
  REQUIREMENTS_PATH: "Python/requirements.txt"

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install API dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r "${{ env.REQUIREMENTS_PATH }}"

      - name: Create API deployment package
        run: |
          mkdir -p deploy-package
          cp -R Python/api deploy-package/api
          cp -R Python/shared deploy-package/shared
          cp Python/requirements.txt deploy-package/requirements.txt

      - name: Upload API deployment artifact
        uses: actions/upload-artifact@v4
        with:
          name: python-api
          path: deploy-package
          if-no-files-found: error
          retention-days: 1

  deploy:
    runs-on: ubuntu-latest
    needs: build

    permissions:
      contents: read

    steps:
      - name: Download API deployment artifact
        uses: actions/download-artifact@v4
        with:
          name: python-api
          path: api-package

      - name: Deploy API to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: "csi4999-api"
          slot-name: "Production"
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: "api-package"